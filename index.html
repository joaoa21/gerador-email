<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: rgb(99,179,237);
    --accent-dim: rgba(99,179,237,0.12);
    --dark: #0d0d0f;
    --surface: #16171a;
    --surface2: #1e1f24;
    --border: rgba(99,179,237,0.15);
    --white: #f0f0f2;
    --muted: rgba(240,240,242,0.45);
    --green: #48bb78;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--dark);
    color: var(--white);
    display: flex;
    flex-direction: column;
  }

  .header {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(13,13,15,0.97);
    flex-shrink: 0;
    z-index: 100;
  }
  .header-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; }
  .header-title span { color: var(--accent); }

  .btn-copy {
    display: flex; align-items: center; gap: 8px;
    background: var(--accent);
    color: #0d0d0f;
    border: none; border-radius: 8px;
    padding: 10px 20px;
    font-family: 'Inter', sans-serif;
    font-weight: 600; font-size: 0.85rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-copy:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-copy.copied { background: var(--green); color: #fff; }

  .workspace {
    display: grid;
    grid-template-columns: 370px 1fr;
    flex: 1;
    overflow: hidden;
  }

  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 22px 18px 40px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .section-label {
    font-size: 0.66rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 0.78rem; font-weight: 500; color: var(--muted); }
  .field input[type="text"],
  .field input[type="url"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 0.84rem;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .field input:focus { border-color: var(--accent); }

  .color-row { display: grid; grid-template-columns: 1fr 44px; gap: 8px; align-items: end; }
  .field input[type="color"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    height: 38px;
    width: 100%;
    padding: 3px 5px;
    cursor: pointer;
    outline: none;
  }

  .toggle-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
  }
  .toggle-row input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
  .toggle-row span { font-size: 0.82rem; color: var(--muted); }

  .divider-line { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); }

  .rich-toolbar {
    display: flex; gap: 3px; flex-wrap: wrap;
    padding: 7px;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 8px 8px 0 0;
  }
  .tb-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 5px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 0.73rem;
    font-weight: 600;
    padding: 4px 8px;
    transition: all 0.15s;
  }
  .tb-btn:hover { background: var(--surface2); border-color: var(--border); color: var(--white); }
  .tb-sep { width: 1px; background: var(--border); margin: 3px 2px; }

  .editor {
    min-height: 120px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    padding: 11px 12px;
    outline: none;
    font-size: 0.84rem;
    line-height: 1.65;
    color: var(--white);
    overflow-y: auto;
  }
  .editor:focus { border-color: var(--accent); }
  .editor a { color: var(--accent); }
  .editor ul, .editor ol { padding-left: 20px; }

  .optional-block {
    border: 1px dashed rgba(99,179,237,0.2);
    border-radius: 10px;
    padding: 14px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .optional-block.enabled { border-color: var(--accent); border-style: solid; }

  .saved-badge {
    font-size: 0.68rem; color: var(--green); font-weight: 500;
    opacity: 0; transition: opacity 0.3s;
  }
  .saved-badge.show { opacity: 1; }

  .footer-note {
    padding: 11px 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.7rem;
    color: var(--muted);
    line-height: 1.6;
  }
  .footer-note strong { color: var(--accent); }

  .preview-area {
    background: #252525;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px;
    gap: 12px;
  }
  .preview-label {
    font-size: 0.66rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    align-self: flex-start;
  }
  .preview-frame {
    width: 100%; max-width: 620px;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  #previewFrame {
    width: 100%;
    border: none;
    display: block;
    background: #fff;
    min-height: 400px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Email <span>Generator</span></div>
  <button class="btn-copy" id="btnCopy" onclick="copyHTML()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
    Copiar HTML
  </button>
</div>

<div class="workspace">

  <div class="sidebar">

    <div>
      <div class="section-label">Logo</div>
      <div class="field">
        <label>URL da logo &nbsp;<span class="saved-badge" id="logoSavedBadge">&#10003; salvo</span></label>
        <input type="url" id="logoUrl" placeholder="https://..." oninput="saveLogo(); updatePreview()">
      </div>
    </div>

    <div class="divider-line"></div>

    <div>
      <div class="section-label">Banner</div>
      <div class="field">
        <label>URL do banner</label>
        <input type="url" id="bannerUrl" placeholder="https://..." oninput="updatePreview()">
      </div>
      <div class="field" style="margin-top:10px">
        <label>Link do banner (opcional)</label>
        <input type="url" id="bannerLink" placeholder="https://..." oninput="updatePreview()">
      </div>
    </div>

    <div class="divider-line"></div>

    <div>
      <div class="section-label">Titulo</div>
      <div class="field">
        <input type="text" id="emailTitle" placeholder="Ex: Grande Promocao de Hoje!" oninput="updatePreview()">
      </div>
    </div>

    <div class="divider-line"></div>

    <div>
      <div class="section-label">Corpo do texto</div>
      <div class="rich-toolbar">
        <button class="tb-btn" onmousedown="fmtCmd(event,'bold')"><b>B</b></button>
        <button class="tb-btn" onmousedown="fmtCmd(event,'italic')"><i>I</i></button>
        <button class="tb-btn" onmousedown="fmtCmd(event,'underline')"><u>U</u></button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onmousedown="fmtCmd(event,'insertUnorderedList')">Lista</button>
        <button class="tb-btn" onmousedown="fmtCmd(event,'insertOrderedList')">1. Lista</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onmousedown="insertLinkCmd(event)">Link</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onmousedown="fmtCmd(event,'justifyLeft')">Esq</button>
        <button class="tb-btn" onmousedown="fmtCmd(event,'justifyCenter')">Centro</button>
        <button class="tb-btn" onmousedown="fmtCmd(event,'justifyRight')">Dir</button>
      </div>
      <div class="editor" id="bodyEditor" contenteditable="true" oninput="updatePreview()"></div>
    </div>

    <div class="divider-line"></div>

    <div>
      <div class="section-label">Botao CTA <span style="color:var(--muted);font-size:0.63rem;text-transform:none;letter-spacing:0;font-weight:400">(opcional)</span></div>
      <div class="optional-block" id="btnBlock">
        <label class="toggle-row">
          <input type="checkbox" id="btnEnabled" onchange="toggleBtn(); updatePreview()">
          <span>Incluir botao de acao</span>
        </label>
        <div id="btnFields" style="display:none; flex-direction:column; gap:11px;">
          <div class="field">
            <label>Texto do botao</label>
            <input type="text" id="btnText" placeholder="Ex: Apostar Agora" oninput="updatePreview()">
          </div>
          <div class="field">
            <label>Link de destino</label>
            <input type="url" id="btnLink" placeholder="https://..." oninput="updatePreview()">
          </div>
          <div class="field">
            <label>Cor do botao</label>
            <div class="color-row">
              <input type="text" id="btnColorHex" value="#22c55e" placeholder="#22c55e" oninput="syncHexToPicker(); updatePreview()">
              <input type="color" id="btnColor" value="#22c55e" oninput="syncPickerToHex(); updatePreview()">
            </div>
          </div>
          <label class="toggle-row">
            <input type="checkbox" id="btnNewTab" checked onchange="updatePreview()">
            <span>Abrir em nova aba</span>
          </label>
        </div>
      </div>
    </div>

    <div class="divider-line"></div>

    <div class="footer-note">
      <strong>Rodape</strong> fixo no template.<br>
      Para personalizar, edite o codigo gerado.
    </div>

  </div>

  <div class="preview-area">
    <div class="preview-label">Preview ao vivo</div>
    <div class="preview-frame">
      <iframe id="previewFrame" title="Preview"></iframe>
    </div>
  </div>

</div>

<script>
(function () {

  window.addEventListener('DOMContentLoaded', function () {
    var saved = localStorage.getItem('emailgen_logo');
    if (saved) {
      document.getElementById('logoUrl').value = saved;
      document.getElementById('logoSavedBadge').classList.add('show');
    }
    updatePreview();
  });

  window.saveLogo = function () {
    var val = document.getElementById('logoUrl').value;
    localStorage.setItem('emailgen_logo', val);
    var badge = document.getElementById('logoSavedBadge');
    badge.classList.add('show');
    clearTimeout(badge._t);
    badge._t = setTimeout(function () { badge.classList.remove('show'); }, 2000);
  };

  window.fmtCmd = function (e, cmd) {
    e.preventDefault();
    document.execCommand(cmd, false, null);
    updatePreview();
  };

  window.insertLinkCmd = function (e) {
    e.preventDefault();
    var url = prompt('URL do link:');
    if (!url) return;
    document.execCommand('createLink', false, url);
    updatePreview();
  };

  window.toggleBtn = function () {
    var enabled = document.getElementById('btnEnabled').checked;
    document.getElementById('btnFields').style.display = enabled ? 'flex' : 'none';
    document.getElementById('btnBlock').classList.toggle('enabled', enabled);
  };

  window.syncPickerToHex = function () {
    document.getElementById('btnColorHex').value = document.getElementById('btnColor').value;
  };

  window.syncHexToPicker = function () {
    var hex = document.getElementById('btnColorHex').value;
    if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
      document.getElementById('btnColor').value = hex;
    }
  };

  function generateEmailHTML() {
    var logo      = document.getElementById('logoUrl').value.trim();
    var banner    = document.getElementById('bannerUrl').value.trim();
    var bannerLnk = document.getElementById('bannerLink').value.trim();
    var title     = document.getElementById('emailTitle').value.trim();
    var body      = document.getElementById('bodyEditor').innerHTML.trim();
    var btnOn     = document.getElementById('btnEnabled').checked;
    var btnTxt    = document.getElementById('btnText').value.trim();
    var btnLnk    = document.getElementById('btnLink').value.trim();
    var btnClr    = document.getElementById('btnColorHex').value.trim() || '#22c55e';
    var btnTab    = document.getElementById('btnNewTab').checked;

    var logoRow = logo
      ? '<tr><td align="center" style="padding:24px 40px 16px;"><img src="' + logo + '" alt="Logo" style="max-height:60px;max-width:200px;display:block;" /></td></tr>'
      : '';

    var bannerImg = '<img src="' + banner + '" alt="Banner" width="600" style="display:block;width:100%;max-width:600px;height:auto;" />';
    var bannerRow = banner
      ? '<tr><td style="padding:0;">' + (bannerLnk ? '<a href="' + bannerLnk + '" target="_blank" style="display:block;">' + bannerImg + '</a>' : bannerImg) + '</td></tr>'
      : '';

    var titleRow = title
      ? '<tr><td style="padding:24px 40px 8px;"><h1 style="margin:0;font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:700;color:#1a1a1a;line-height:1.3;">' + title + '</h1></td></tr>'
      : '';

    var bodyRow = body
      ? '<tr><td style="padding:10px 40px 24px;"><div style="font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.75;color:#333;">' + body + '</div></td></tr>'
      : '';

    var btnRow = (btnOn && btnTxt && btnLnk)
      ? '<tr><td align="center" style="padding:6px 40px 32px;"><a href="' + btnLnk + '"' + (btnTab ? ' target="_blank"' : '') + ' style="display:inline-block;background-color:' + btnClr + ';color:#fff;font-family:Arial,Helvetica,sans-serif;font-size:16px;font-weight:700;text-decoration:none;padding:14px 36px;border-radius:6px;">' + btnTxt + '</a></td></tr>'
      : '';

    var footerRow = '<tr><td style="background:#f5f5f5;padding:18px 40px;border-top:1px solid #e8e8e8;"><p style="margin:0;font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#999;text-align:center;line-height:1.6;">Voce esta recebendo este e-mail pois se cadastrou em nossa plataforma.<br><a href="#" style="color:#999;">Descadastrar</a> &middot; <a href="#" style="color:#999;">Politica de Privacidade</a></p></td></tr>';

    return '<!DOCTYPE html>'
      + '<html lang="pt-BR"><head>'
      + '<meta charset="UTF-8">'
      + '<meta name="viewport" content="width=device-width,initial-scale=1">'
      + '<meta http-equiv="X-UA-Compatible" content="IE=edge">'
      + '<title>' + (title || 'E-mail') + '</title>'
      + '</head><body style="margin:0;padding:0;background:#f0f0f0;">'
      + '<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f0f0f0;">'
      + '<tr><td align="center" style="padding:24px 12px;">'
      + '<table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">'
      + logoRow + bannerRow + titleRow + bodyRow + btnRow + footerRow
      + '</table></td></tr></table>'
      + '</body></html>';
  }

  window.updatePreview = function () {
    var html = generateEmailHTML();
    var frame = document.getElementById('previewFrame');
    frame.srcdoc = html;
    frame.onload = function () {
      try {
        frame.style.height = (frame.contentDocument.body.scrollHeight + 20) + 'px';
      } catch (e) {}
    };
  };

  window.copyHTML = function () {
    var html = generateEmailHTML();
    navigator.clipboard.writeText(html).then(function () {
      var btn = document.getElementById('btnCopy');
      btn.classList.add('copied');
      btn.innerHTML = 'Copiado!';
      setTimeout(function () {
        btn.classList.remove('copied');
        btn.innerHTML = 'Copiar HTML';
      }, 2500);
    });
  };

}());
</script>
</body>
</html>
