<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Generator – Jogo de Ouro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #f4d303;
    --accent-dark: #c9ac00;
    --dark: #0d0d0f;
    --surface: #16171a;
    --surface2: #1e1f24;
    --border: rgba(244,211,3,0.18);
    --white: #f0f0f2;
    --muted: rgba(240,240,242,0.45);
    --green: #48bb78;
    --jdoverde: #004409;
    --jdobg: #002d14;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--white); display: flex; flex-direction: column; }

  /* HEADER */
  .header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(13,13,15,0.98);
    flex-shrink: 0; z-index: 100;
  }
  .header-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
  .header-title span { color: var(--accent); }
  .header-actions { display: flex; gap: 10px; align-items: center; }

  .btn-primary {
    display: flex; align-items: center; gap: 7px;
    background: var(--accent); color: #111;
    border: none; border-radius: 7px;
    padding: 9px 18px;
    font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.82rem;
    cursor: pointer; transition: opacity 0.2s, transform 0.15s;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-primary.copied { background: var(--green); color: #fff; }

  /* WORKSPACE */
  .workspace { display: grid; grid-template-columns: 360px 1fr; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 16px 50px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .section-label {
    font-size: 0.64rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px;
  }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 0.76rem; font-weight: 500; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .field input[type="text"],
  .field input[type="url"],
  .field textarea {
    background: var(--surface2);
    border: 1px solid rgba(244,211,3,0.12);
    border-radius: 7px;
    color: var(--white);
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    padding: 8px 11px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    resize: none;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { min-height: 60px; }

  .color-row { display: grid; grid-template-columns: 1fr 42px; gap: 7px; align-items: end; }
  .field input[type="color"] {
    background: var(--surface2); border: 1px solid rgba(244,211,3,0.12);
    border-radius: 7px; height: 36px; width: 100%;
    padding: 3px 4px; cursor: pointer; outline: none;
  }

  .toggle-row {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 11px;
    background: var(--surface2); border: 1px solid rgba(244,211,3,0.12);
    border-radius: 7px; cursor: pointer; user-select: none;
    transition: border-color 0.2s;
  }
  .toggle-row:hover { border-color: var(--accent); }
  .toggle-row input[type="checkbox"] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
  .toggle-row span { font-size: 0.8rem; color: var(--muted); }

  .divider-line { height: 1px; background: linear-gradient(90deg, transparent, rgba(244,211,3,0.15), transparent); }

  /* RICH TEXT */
  .rich-toolbar {
    display: flex; gap: 2px; flex-wrap: wrap;
    padding: 6px; background: var(--dark);
    border: 1px solid rgba(244,211,3,0.12); border-radius: 7px 7px 0 0;
  }
  .tb-btn {
    background: transparent; border: 1px solid transparent;
    border-radius: 4px; color: var(--muted);
    cursor: pointer; font-family: 'Inter', sans-serif;
    font-size: 0.71rem; font-weight: 700;
    padding: 3px 7px; transition: all 0.15s;
  }
  .tb-btn:hover { background: var(--surface2); border-color: rgba(244,211,3,0.2); color: var(--white); }
  .tb-sep { width: 1px; background: rgba(244,211,3,0.12); margin: 2px 2px; }

  .editor {
    min-height: 140px;
    background: var(--surface2);
    border: 1px solid rgba(244,211,3,0.12); border-top: none;
    border-radius: 0 0 7px 7px;
    padding: 10px 11px; outline: none;
    font-size: 0.82rem; line-height: 1.65;
    color: var(--white); overflow-y: auto;
  }
  .editor:focus { border-color: var(--accent); }
  .editor a { color: var(--accent); }
  .editor ul, .editor ol { padding-left: 18px; }

  .optional-block {
    border: 1px dashed rgba(244,211,3,0.15);
    border-radius: 9px; padding: 13px;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color 0.2s;
  }
  .optional-block.enabled { border-color: var(--accent); border-style: solid; }

  .saved-badge { font-size: 0.66rem; color: var(--green); font-weight: 600; opacity: 0; transition: opacity 0.3s; }
  .saved-badge.show { opacity: 1; }

  .colors-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .info-box {
    padding: 10px 12px; background: var(--surface2);
    border: 1px solid rgba(244,211,3,0.1); border-radius: 7px;
    font-size: 0.69rem; color: var(--muted); line-height: 1.6;
  }
  .info-box strong { color: var(--accent); }

  /* PREVIEW */
  .preview-area {
    background: #1a1a1a; overflow-y: auto;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px; gap: 10px;
  }
  .preview-label {
    font-size: 0.63rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,255,255,0.2); align-self: flex-start;
  }
  .preview-frame {
    width: 100%; max-width: 640px;
    border-radius: 6px; overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  #previewFrame {
    width: 100%; border: none; display: block;
    background: #002d14; min-height: 500px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Email <span>Generator</span> <span style="color:var(--muted);font-weight:400;font-size:0.8rem;">– Jogo de Ouro</span></div>
  <div class="header-actions">
    <button class="btn-primary" id="btnCopy" onclick="copyHTML()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      Copiar HTML
    </button>
  </div>
</div>

<div class="workspace">
  <div class="sidebar">

    <!-- PREVIEW TEXT -->
    <div>
      <div class="section-label">Preview Text</div>
      <div class="field">
        <label>Texto de preview (aparece no Gmail antes de abrir)</label>
        <input type="text" id="previewText" placeholder="Ex: Ative a missao e participe." oninput="updatePreview()">
      </div>
    </div>

    <div class="divider-line"></div>

    <!-- BANNER -->
    <div>
      <div class="section-label">Banner</div>
      <div class="field">
        <label>URL do banner</label>
        <input type="url" id="bannerUrl" placeholder="https://..." oninput="updatePreview()">
      </div>
      <div class="field" style="margin-top:8px">
        <label>Link do banner (opcional)</label>
        <input type="url" id="bannerLink" placeholder="https://..." oninput="updatePreview()">
      </div>
    </div>

    <div class="divider-line"></div>

    <!-- SAUDACAO -->
    <div>
      <div class="section-label">Saudacao</div>
      <div class="field">
        <label>Texto de saudacao</label>
        <input type="text" id="greeting" value="Ola, {{state.user_first_name}}!" oninput="updatePreview()">
      </div>
    </div>

    <div class="divider-line"></div>

    <!-- CORPO -->
    <div>
      <div class="section-label">Corpo do texto</div>
      <div class="rich-toolbar">
        <button class="tb-btn" onmousedown="fmtCmd(event,'bold')"><b>B</b></button>
        <button class="tb-btn" onmousedown="fmtCmd(event,'italic')"><i>I</i></button>
        <button class="tb-btn" onmousedown="fmtCmd(event,'underline')"><u>U</u></button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onmousedown="fmtCmd(event,'insertUnorderedList')">Lista</button>
        <button class="tb-btn" onmousedown="fmtCmd(event,'insertOrderedList')">1. Lista</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onmousedown="insertLinkCmd(event)">Link</button>
        <div class="tb-sep"></div>
        <button class="tb-btn" onmousedown="fmtCmd(event,'justifyLeft')">Esq</button>
        <button class="tb-btn" onmousedown="fmtCmd(event,'justifyCenter')">Centro</button>
        <button class="tb-btn" onmousedown="fmtCmd(event,'justifyRight')">Dir</button>
      </div>
      <div class="editor" id="bodyEditor" contenteditable="true" oninput="updatePreview()"></div>
    </div>

    <div class="divider-line"></div>

    <!-- BOTAO CTA -->
    <div>
      <div class="section-label">Botao CTA <span style="color:var(--muted);font-size:0.6rem;text-transform:none;letter-spacing:0;font-weight:400">(opcional)</span></div>
      <div class="optional-block" id="btnBlock">
        <label class="toggle-row">
          <input type="checkbox" id="btnEnabled" onchange="toggleBtn(); updatePreview()">
          <span>Incluir botao de acao</span>
        </label>
        <div id="btnFields" style="display:none; flex-direction:column; gap:9px;">
          <div class="field">
            <label>Texto do botao</label>
            <input type="text" id="btnText" placeholder="Ex: ATIVAR A MISSAO" oninput="updatePreview()">
          </div>
          <div class="field">
            <label>Link de destino</label>
            <input type="url" id="btnLink" placeholder="https://..." oninput="updatePreview()">
          </div>
          <div class="field">
            <label>Cor de fundo do botao</label>
            <div class="color-row">
              <input type="text" id="btnBgHex" value="#f4d303" oninput="syncHex('btnBgHex','btnBgColor'); updatePreview()">
              <input type="color" id="btnBgColor" value="#f4d303" oninput="syncPicker('btnBgColor','btnBgHex'); updatePreview()">
            </div>
          </div>
          <div class="field">
            <label>Cor do texto do botao</label>
            <div class="color-row">
              <input type="text" id="btnTxtHex" value="#242424" oninput="syncHex('btnTxtHex','btnTxtColor'); updatePreview()">
              <input type="color" id="btnTxtColor" value="#242424" oninput="syncPicker('btnTxtColor','btnTxtHex'); updatePreview()">
            </div>
          </div>
          <div class="field">
            <label>Cor da borda do botao</label>
            <div class="color-row">
              <input type="text" id="btnBorderHex" value="#000000" oninput="syncHex('btnBorderHex','btnBorderColor'); updatePreview()">
              <input type="color" id="btnBorderColor" value="#000000" oninput="syncPicker('btnBorderColor','btnBorderHex'); updatePreview()">
            </div>
          </div>
          <label class="toggle-row">
            <input type="checkbox" id="btnNewTab" checked onchange="updatePreview()">
            <span>Abrir em nova aba</span>
          </label>
        </div>
      </div>
    </div>

    <div class="divider-line"></div>

    <!-- CORES -->
    <div>
      <div class="section-label">Cores</div>
      <div class="colors-grid">
        <div class="field">
          <label>Fundo externo</label>
          <div class="color-row">
            <input type="text" id="bgHex" value="#002d14" oninput="syncHex('bgHex','bgColor'); updatePreview()">
            <input type="color" id="bgColor" value="#002d14" oninput="syncPicker('bgColor','bgHex'); updatePreview()">
          </div>
        </div>
        <div class="field">
          <label>Card logo/rodape</label>
          <div class="color-row">
            <input type="text" id="cardVerdeHex" value="#004409" oninput="syncHex('cardVerdeHex','cardVerdeColor'); updatePreview()">
            <input type="color" id="cardVerdeColor" value="#004409" oninput="syncPicker('cardVerdeColor','cardVerdeHex'); updatePreview()">
          </div>
        </div>
        <div class="field">
          <label>Card conteudo bg</label>
          <div class="color-row">
            <input type="text" id="cardBgHex" value="#f9f9fa" oninput="syncHex('cardBgHex','cardBgColor'); updatePreview()">
            <input type="color" id="cardBgColor" value="#f9f9fa" oninput="syncPicker('cardBgColor','cardBgHex'); updatePreview()">
          </div>
        </div>
        <div class="field">
          <label>Card conteudo texto</label>
          <div class="color-row">
            <input type="text" id="cardTxtHex" value="#242424" oninput="syncHex('cardTxtHex','cardTxtColor'); updatePreview()">
            <input type="color" id="cardTxtColor" value="#242424" oninput="syncPicker('cardTxtColor','cardTxtHex'); updatePreview()">
          </div>
        </div>
        <div class="field">
          <label>Saudacao cor</label>
          <div class="color-row">
            <input type="text" id="greetingColorHex" value="#242424" oninput="syncHex('greetingColorHex','greetingColor'); updatePreview()">
            <input type="color" id="greetingColor" value="#242424" oninput="syncPicker('greetingColor','greetingColorHex'); updatePreview()">
          </div>
        </div>
        <div class="field">
          <label>Borda card conteudo</label>
          <div class="color-row">
            <input type="text" id="cardBorderHex" value="#e1e1e6" oninput="syncHex('cardBorderHex','cardBorderColor'); updatePreview()">
            <input type="color" id="cardBorderColor" value="#e1e1e6" oninput="syncPicker('cardBorderColor','cardBorderHex'); updatePreview()">
          </div>
        </div>
      </div>
    </div>

    <div class="divider-line"></div>

    <div class="info-box">
      <strong>Logo e rodape fixos</strong> (Jogo de Ouro).<br>
      Redes sociais, links e aviso legal ja estao no template.
    </div>

  </div><!-- /sidebar -->

  <div class="preview-area">
    <div class="preview-label">Preview ao vivo</div>
    <div class="preview-frame">
      <iframe id="previewFrame" title="Preview do e-mail"></iframe>
    </div>
  </div>
</div>

<script>
(function () {

  /* ── HELPERS DE COR ── */
  window.syncPicker = function (pickerId, hexId) {
    document.getElementById(hexId).value = document.getElementById(pickerId).value;
  };
  window.syncHex = function (hexId, pickerId) {
    var hex = document.getElementById(hexId).value;
    if (/^#[0-9a-fA-F]{6}$/.test(hex)) document.getElementById(pickerId).value = hex;
  };

  function val(id) { return document.getElementById(id).value.trim(); }
  function checked(id) { return document.getElementById(id).checked; }

  /* ── RICH TEXT ── */
  window.fmtCmd = function (e, cmd) {
    e.preventDefault();
    document.execCommand(cmd, false, null);
    updatePreview();
  };
  window.insertLinkCmd = function (e) {
    e.preventDefault();
    var url = prompt('URL do link:');
    if (!url) return;
    document.execCommand('createLink', false, url);
    updatePreview();
  };

  /* ── BOTAO TOGGLE ── */
  window.toggleBtn = function () {
    var on = checked('btnEnabled');
    document.getElementById('btnFields').style.display = on ? 'flex' : 'none';
    document.getElementById('btnBlock').classList.toggle('enabled', on);
  };

  /* ── GERAR HTML DO EMAIL ── */
  function generateEmailHTML() {
    var previewText  = val('previewText') || '';
    var banner       = val('bannerUrl');
    var bannerLnk    = val('bannerLink');
    var greeting     = val('greeting') || 'Ola!';
    var body         = document.getElementById('bodyEditor').innerHTML.trim();
    var btnOn        = checked('btnEnabled');
    var btnTxt       = val('btnText');
    var btnLnk       = val('btnLink');
    var btnBg        = val('btnBgHex') || '#f4d303';
    var btnTxt2      = val('btnTxtHex') || '#242424';
    var btnBorder    = val('btnBorderHex') || '#000000';
    var btnTab       = checked('btnNewTab');

    var bgExt        = val('bgHex') || '#002d14';
    var cardVerde    = val('cardVerdeHex') || '#004409';
    var cardBg       = val('cardBgHex') || '#f9f9fa';
    var cardTxt      = val('cardTxtHex') || '#242424';
    var greetingClr  = val('greetingColorHex') || '#242424';
    var cardBorder   = val('cardBorderHex') || '#e1e1e6';

    /* Preview text block */
    var previewBlock = previewText
      ? '<div style="display:none;overflow:hidden;line-height:1px;opacity:0;max-height:0;max-width:0;" data-skip-in-text="true">'
        + previewText
        + '<div>' + '&zwnj;&nbsp;'.repeat(90) + '</div></div>'
      : '';

    /* Banner block */
    var bannerImg = banner
      ? '<img alt="Banner" src="' + banner + '" style="display:block;outline:none;border:none;text-decoration:none;width:100%;height:auto;" width="600" />'
      : '';
    var bannerWrapped = bannerImg
      ? (bannerLnk ? '<a href="' + bannerLnk + '" target="_blank" style="display:block;">' + bannerImg + '</a>' : bannerImg)
      : '';
    var bannerCard = bannerWrapped
      ? '<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="max-width:600px;margin:0 auto 10px;background-color:#eeeeee;color:#242424;border-radius:15px;border:1px solid ' + cardVerde + ';overflow:hidden;">'
        + '<tbody><tr style="width:100%"><td>'
        + '<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="padding:0;text-align:center;">'
        + '<tbody><tr><td>' + bannerWrapped + '</td></tr></tbody></table>'
        + '</td></tr></tbody></table>'
      : '';

    /* Botao CTA */
    var btnHtml = (btnOn && btnTxt && btnLnk)
      ? '<div style="margin-top:30px;text-align:center;">'
        + '<a href="' + btnLnk + '"' + (btnTab ? ' target="_blank"' : '') + ' style="line-height:100%;text-decoration:none;display:inline-block;max-width:100%;background-color:' + btnBg + ';color:' + btnTxt2 + ';font-weight:900;padding:12px 30px;font-size:16px;border-radius:10px;border:3px solid ' + btnBorder + ';text-transform:uppercase;">'
        + '<span style="max-width:100%;display:inline-block;line-height:120%;">' + btnTxt + '</span></a>'
        + '</div>'
      : '';

    /* Corpo */
    var bodyHtml = body
      ? '<p style="font-size:16px;line-height:165%;font-weight:500;margin-top:16px;margin-bottom:16px;color:' + cardTxt + ';">' + body + '</p>'
      : '';

    return '<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">'
      + '<html style="margin:0;padding:0" dir="ltr" lang="pt-BR">'
      + '<head>'
      + '<meta content="text/html; charset=UTF-8" http-equiv="Content-Type" />'
      + '<meta name="x-apple-disable-message-reformatting" />'
      + '<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />'
      + '</head>'
      + '<body style="background-color:' + bgExt + '">'
      + previewBlock
      + '<table border="0" width="100%" cellpadding="0" cellspacing="0" role="presentation" align="center"><tbody><tr>'
      + '<td style="margin:0;padding:0;padding-top:50px;padding-bottom:50px;background-color:' + bgExt + ';font-family:\'Inter\',Arial,sans-serif;">'

      /* CARD LOGO */
      + '<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="max-width:600px;margin:0 auto 10px;background-color:' + cardVerde + ';color:#f0f0f0;border-radius:15px;overflow:hidden;">'
      + '<tbody><tr style="width:100%"><td>'
      + '<h1 style="padding:10px 0 0;text-align:center;">'
      + '<img alt="Jogo de Ouro" src="https://static5.smr.vc/efdae8e354ffda834bd6ad-LOGOJOGODEOURO.png" style="display:inline-block;outline:none;border:none;text-decoration:none;max-width:100%;" width="250" />'
      + '</h1>'
      + '</td></tr></tbody></table>'

      /* CARD BANNER */
      + bannerCard

      /* CARD CONTEUDO */
      + '<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="max-width:600px;margin:0 auto 10px;background-color:' + cardBg + ';color:' + cardTxt + ';border-radius:15px;border:1px solid ' + cardBorder + ';overflow:hidden;">'
      + '<tbody><tr style="width:100%"><td>'
      + '<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="padding:40px 25px;">'
      + '<tbody><tr><td>'
      + '<p style="font-size:24px;line-height:150%;font-weight:900;margin-bottom:15px;text-align:center;margin-top:16px;color:' + greetingClr + ';">' + greeting + '</p>'
      + bodyHtml
      + btnHtml
      + '</td></tr></tbody></table>'
      + '</td></tr></tbody></table>'

      /* CARD RODAPE */
      + '<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="max-width:600px;margin:0 auto 10px;background-color:' + cardVerde + ';color:#f0f0f0;border-radius:15px;overflow:hidden;">'
      + '<tbody><tr style="width:100%"><td>'
      + '<p style="font-size:14px;line-height:24px;color:#dadada;margin-top:20px;margin-bottom:10px;text-align:center;padding-inline:40px;">*Destinado para maiores de 18 anos. Jogue com responsabilidade.*<br />Portaria SPA/MF No 693/25</p>'
      + '<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="text-align:center;">'
      + '<tbody><tr><td>'
      + '<p style="font-size:15px;line-height:24px;color:#ffffff;margin-bottom:16px;padding-inline:40px;margin-top:16px;">Fique de olho nas nossas redes sociais e nao perca nada!</p>'
      + '<table style="margin:0 auto" cellpadding="0" cellspacing="0" role="presentation"><tr>'
      + '<td style="padding:0 15px;"><a href="https://www.instagram.com/jogodeourobet/" target="_blank" rel="noopener noreferrer"><img alt="Instagram" src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" style="display:block;outline:none;border:none;text-decoration:none;border-radius:100%;" width="35" /></a></td>'
