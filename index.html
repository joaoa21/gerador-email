<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Generator – Jogo de Ouro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #f4d303;
    --dark: #0d0d0f;
    --surface: #16171a;
    --surface2: #1e1f24;
    --border: rgba(244,211,3,0.15);
    --border2: rgba(244,211,3,0.08);
    --white: #f0f0f2;
    --muted: rgba(240,240,242,0.45);
    --green: #48bb78;
    --red: #fc8181;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--white); display: flex; flex-direction: column; }

  .header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: rgba(13,13,15,0.98); flex-shrink: 0; z-index: 200; }
  .header-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
  .header-title span { color: var(--accent); }
  .header-title small { color: var(--muted); font-weight: 400; font-size: 0.75rem; }
  .btn-copy { display: flex; align-items: center; gap: 6px; background: var(--accent); color: #111; border: none; border-radius: 7px; padding: 8px 16px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: opacity 0.2s, transform 0.15s; }
  .btn-copy:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-copy.copied { background: var(--green); color: #fff; }

  .workspace { display: grid; grid-template-columns: 460px 1fr; flex: 1; overflow: hidden; min-height: 0; }

  .sidebar { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px 14px 60px; display: flex; flex-direction: column; gap: 14px; }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .section-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }

  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 0.73rem; font-weight: 500; color: var(--muted); display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .field input[type="text"], .field input[type="url"], .field textarea { background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; color: var(--white); font-family: 'Inter', sans-serif; font-size: 0.8rem; padding: 7px 10px; outline: none; transition: border-color 0.2s; width: 100%; }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: none; font-size: 0.75rem; line-height: 1.5; overflow: hidden; min-height: 40px; }

  .color-row { display: grid; grid-template-columns: 1fr 38px; gap: 6px; align-items: end; }
  .field input[type="color"] { background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; height: 34px; width: 100%; padding: 3px 4px; cursor: pointer; outline: none; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  .toggle-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; cursor: pointer; user-select: none; transition: border-color 0.2s; }
  .toggle-row:hover { border-color: var(--accent); }
  .toggle-row input[type="checkbox"] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
  .toggle-row span { font-size: 0.78rem; color: var(--muted); }

  .divider-line { height: 1px; background: linear-gradient(90deg, transparent, rgba(244,211,3,0.15), transparent); flex-shrink: 0; }

  /* BLOCKS */
  .block-wrap { border: 1px solid var(--border2); border-radius: 9px; overflow: hidden; background: var(--dark); }
  .block-header { display: flex; align-items: center; justify-content: space-between; padding: 5px 8px; background: rgba(244,211,3,0.05); border-bottom: 1px solid var(--border2); gap: 6px; }
  .block-label { font-size: 0.65rem; color: var(--muted); font-weight: 600; white-space: nowrap; }
  .block-header-right { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }

  .seg-btn { background: transparent; border: 1px solid var(--border2); border-radius: 4px; color: var(--muted); cursor: pointer; font-size: 0.65rem; font-weight: 600; padding: 2px 7px; transition: all 0.15s; font-family: 'Inter', sans-serif; }
  .seg-btn:hover { border-color: rgba(244,211,3,0.3); color: var(--white); }
  .seg-btn.active { background: rgba(244,211,3,0.12); border-color: var(--accent); color: var(--accent); }

  .block-remove { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 0.8rem; padding: 2px 5px; border-radius: 4px; transition: all 0.15s; line-height: 1; }
  .block-remove:hover { color: var(--red); background: rgba(252,129,129,0.1); }

  .rich-toolbar { display: flex; gap: 2px; flex-wrap: wrap; padding: 5px 6px; background: #111113; border-bottom: 1px solid var(--border2); align-items: center; }
  .tb-btn { background: transparent; border: 1px solid transparent; border-radius: 4px; color: var(--muted); cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.68rem; font-weight: 700; padding: 3px 6px; transition: all 0.15s; white-space: nowrap; }
  .tb-btn:hover { background: var(--surface2); border-color: var(--border2); color: var(--white); }
  .tb-sep { width: 1px; background: var(--border2); margin: 2px 1px; align-self: stretch; flex-shrink: 0; }

  .tb-size { background: var(--surface2); border: 1px solid var(--border2); border-radius: 4px; color: var(--white); font-family: 'Inter', sans-serif; font-size: 0.68rem; padding: 3px 4px; outline: none; width: 50px; cursor: pointer; height: 24px; }

  .color-trigger { display: flex; align-items: center; gap: 4px; cursor: pointer; background: transparent; border: 1px solid var(--border2); border-radius: 4px; padding: 2px 6px; color: var(--muted); font-size: 0.68rem; font-weight: 700; font-family: 'Inter', sans-serif; transition: all 0.15s; white-space: nowrap; }
  .color-trigger:hover { background: var(--surface2); border-color: rgba(244,211,3,0.2); color: var(--white); }
  .color-dot { width: 9px; height: 9px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0; }

  /* editor visual */
  .editor { min-height: 80px; background: var(--surface2); border: none; padding: 9px 10px; outline: none; font-size: 0.8rem; line-height: 1.65; color: var(--white); overflow-y: auto; }
  .editor:focus { outline: 1px solid rgba(244,211,3,0.3); outline-offset: -1px; }
  .editor a { color: var(--accent); }
  .editor ul, .editor ol { padding-left: 18px; }

  /* editor HTML — auto-height via JS */
  .editor-html { background: var(--surface2); border: none; padding: 9px 10px; outline: none; font-family: 'Courier New', monospace; font-size: 0.75rem; line-height: 1.6; color: #7dd3fc; resize: none; width: 100%; display: none; overflow: hidden; min-height: 80px; }
  .editor-html:focus { outline: 1px solid rgba(244,211,3,0.3); outline-offset: -1px; }

  .btn-add-block { display: flex; align-items: center; justify-content: center; gap: 5px; width: 100%; padding: 8px; background: transparent; border: 1px dashed rgba(244,211,3,0.2); border-radius: 7px; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
  .btn-add-block:hover { border-color: var(--accent); color: var(--accent); background: rgba(244,211,3,0.04); }

  .optional-block { border: 1px dashed rgba(244,211,3,0.15); border-radius: 9px; padding: 11px; display: flex; flex-direction: column; gap: 9px; }
  .optional-block.enabled { border-color: var(--accent); border-style: solid; }

  .btn-insert-var { background: rgba(244,211,3,0.08); border: 1px solid rgba(244,211,3,0.25); border-radius: 5px; color: var(--accent); cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.65rem; font-weight: 600; padding: 2px 7px; transition: all 0.15s; white-space: nowrap; }
  .btn-insert-var:hover { background: rgba(244,211,3,0.16); }

  /* social toggles */
  .social-grid { display: flex; flex-direction: column; gap: 8px; }
  .social-row { display: flex; gap: 8px; align-items: center; }
  .social-check { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; padding: 5px 9px; cursor: pointer; user-select: none; white-space: nowrap; flex-shrink: 0; }
  .social-check input[type="checkbox"] { accent-color: var(--accent); width: 13px; height: 13px; cursor: pointer; }
  .social-check span { font-size: 0.72rem; color: var(--muted); }
  .social-check:hover { border-color: var(--accent); }
  .social-url { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; color: var(--white); font-family: 'Inter', sans-serif; font-size: 0.75rem; padding: 5px 9px; outline: none; transition: border-color 0.2s; }
  .social-url:focus { border-color: var(--accent); }

  /* COLOR POPUP */
  #globalColorPopup { display: none; position: fixed; z-index: 1000; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 10px; gap: 8px; flex-direction: column; width: 200px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
  #globalColorPopup.open { display: flex; }
  #globalColorPopup input[type="color"] { width: 100%; height: 100px; border: none; cursor: pointer; border-radius: 6px; padding: 0; }
  .color-popup-hex { background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; color: var(--white); font-family: 'Inter', sans-serif; font-size: 0.78rem; padding: 6px 8px; outline: none; width: 100%; transition: border-color 0.2s; }
  .color-popup-hex:focus { border-color: var(--accent); }
  .popup-btns { display: flex; gap: 6px; }
  .btn-apply-color { flex: 1; background: var(--accent); color: #111; border: none; border-radius: 6px; padding: 7px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.75rem; cursor: pointer; transition: opacity 0.2s; }
  .btn-apply-color:hover { opacity: 0.85; }
  .btn-reset-color { flex: 1; background: rgba(252,129,129,0.12); color: var(--red); border: 1px solid rgba(252,129,129,0.25); border-radius: 6px; padding: 7px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
  .btn-reset-color:hover { background: rgba(252,129,129,0.2); }

  /* PREVIEW */
  .preview-area { background: #1c1c1e; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .preview-topbar { background: #111113; border-bottom: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; padding: 10px 0; flex-shrink: 0; }
  .view-toggle { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .view-btn { display: flex; align-items: center; gap: 6px; background: transparent; border: none; color: var(--muted); cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 600; padding: 7px 18px; transition: all 0.2s; }
  .view-btn.active { background: var(--accent); color: #111; }
  .view-btn:not(.active):hover { background: rgba(244,211,3,0.08); color: var(--white); }

  /* SCROLL FIX: o scroll é da preview-scroll-area, o iframe cresce com o conteúdo */
  .preview-scroll-area { flex: 1; overflow-y: auto; display: flex; justify-content: center; padding: 24px 16px 40px; align-items: flex-start; }
  .preview-frame-wrap { width: 100%; max-width: 660px; border-radius: 6px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.6); transition: max-width 0.3s ease; flex-shrink: 0; }
  .preview-frame-wrap.mobile { max-width: 420px; }
  #previewFrame { width: 100%; border: none; display: block; background: #002d14; min-height: 200px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Email <span>Generator</span> <small>– Jogo de Ouro</small></div>
  <button class="btn-copy" id="btnCopy" onclick="copyHTML()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
    Copiar HTML
  </button>
</div>

<div class="workspace">
<div class="sidebar">

  <div>
    <div class="section-label">Preview Text</div>
    <div class="field">
      <label>Texto oculto (aparece no Gmail antes de abrir)</label>
      <input type="text" id="previewText" placeholder="Ex: Ative a missao e participe." oninput="updatePreview()">
    </div>
  </div>

  <div class="divider-line"></div>

  <div>
    <div class="section-label">Logo</div>
    <div class="optional-block enabled" id="logoBlock">
      <label class="toggle-row">
        <input type="checkbox" id="logoEnabled" checked onchange="toggleOpt('logoEnabled','logoFields','logoBlock'); updatePreview()">
        <span>Incluir logo no topo</span>
      </label>
      <div id="logoFields" style="display:flex;flex-direction:column;gap:8px;">
        <div class="two-col">
          <div class="field"><label>URL da logo</label><input type="url" id="logoUrl" value="https://static5.smr.vc/efdae8e354ffda834bd6ad-LOGOJOGODEOURO.png" oninput="updatePreview()"></div>
          <div class="field"><label>Link da logo (opcional)</label><input type="url" id="logoLink" placeholder="https://jogodeouro.bet.br" oninput="updatePreview()"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="divider-line"></div>

  <div>
    <div class="section-label">Banner</div>
    <div class="two-col">
      <div class="field"><label>URL do banner</label><input type="url" id="bannerUrl" placeholder="https://..." oninput="updatePreview()"></div>
      <div class="field"><label>Link do banner (opcional)</label><input type="url" id="bannerLink" placeholder="https://..." oninput="updatePreview()"></div>
    </div>
  </div>

  <div class="divider-line"></div>

  <div>
    <div class="section-label">Titulo</div>
    <div class="optional-block enabled" id="titleBlock">
      <label class="toggle-row">
        <input type="checkbox" id="titleEnabled" checked onchange="toggleOpt('titleEnabled','titleFields','titleBlock'); updatePreview()">
        <span>Incluir titulo</span>
      </label>
      <div id="titleFields" style="display:flex;flex-direction:column;gap:8px;">
        <div class="two-col">
          <div class="field">
            <label>Texto <button class="btn-insert-var" onclick="insertVar('titleText','{{state.user_first_name}}')">+ {{nome}}</button></label>
            <input type="text" id="titleText" value="Ola, {{state.user_first_name}}!" oninput="updatePreview()">
          </div>
          <div class="field">
            <label>Cor</label>
            <div class="color-row">
              <input type="text" id="titleColorHex" value="#242424" oninput="syncHex('titleColorHex','titleColor'); updatePreview()">
              <input type="color" id="titleColor" value="#242424" oninput="syncPicker('titleColor','titleColorHex'); updatePreview()">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="divider-line"></div>

  <div>
    <div class="section-label">Blocos de texto</div>
    <div id="blocksContainer" style="display:flex;flex-direction:column;gap:10px;"></div>
    <button class="btn-add-block" onclick="addBlock()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Adicionar bloco de texto
    </button>
  </div>

  <div class="divider-line"></div>

  <div>
    <div class="section-label">Botao CTA <span style="color:var(--muted);font-size:0.58rem;text-transform:none;letter-spacing:0;font-weight:400">(opcional)</span></div>
    <div class="optional-block" id="btnBlock">
      <label class="toggle-row">
        <input type="checkbox" id="btnEnabled" onchange="toggleOpt('btnEnabled','btnFields','btnBlock'); updatePreview()">
        <span>Incluir botao de acao</span>
      </label>
      <div id="btnFields" style="display:none;flex-direction:column;gap:8px;">
        <div class="two-col">
          <div class="field"><label>Texto</label><input type="text" id="btnText" placeholder="ATIVAR A MISSAO" oninput="updatePreview()"></div>
          <div class="field"><label>Link</label><input type="url" id="btnLink" placeholder="https://..." oninput="updatePreview()"></div>
        </div>
        <div class="three-col">
          <div class="field"><label>Fundo</label><div class="color-row"><input type="text" id="btnBgHex" value="#f4d303" oninput="syncHex('btnBgHex','btnBgColor'); updatePreview()"><input type="color" id="btnBgColor" value="#f4d303" oninput="syncPicker('btnBgColor','btnBgHex'); updatePreview()"></div></div>
          <div class="field"><label>Texto</label><div class="color-row"><input type="text" id="btnTxtHex" value="#242424" oninput="syncHex('btnTxtHex','btnTxtColor'); updatePreview()"><input type="color" id="btnTxtColor" value="#242424" oninput="syncPicker('btnTxtColor','btnTxtHex'); updatePreview()"></div></div>
          <div class="field"><label>Borda</label><div class="color-row"><input type="text" id="btnBorderHex" value="#000000" oninput="syncHex('btnBorderHex','btnBorderColor'); updatePreview()"><input type="color" id="btnBorderColor" value="#000000" oninput="syncPicker('btnBorderColor','btnBorderHex'); updatePreview()"></div></div>
        </div>
        <label class="toggle-row"><input type="checkbox" id="btnNewTab" checked onchange="updatePreview()"><span>Abrir em nova aba</span></label>
      </div>
    </div>
  </div>

  <div class="divider-line"></div>

  <div>
    <div class="section-label">Cores</div>
    <div class="two-col">
      <div class="field"><label>Fundo externo</label><div class="color-row"><input type="text" id="bgHex" value="#002d14" oninput="syncHex('bgHex','bgColor'); updatePreview()"><input type="color" id="bgColor" value="#002d14" oninput="syncPicker('bgColor','bgHex'); updatePreview()"></div></div>
      <div class="field"><label>Card logo/rodape</label><div class="color-row"><input type="text" id="cardVerdeHex" value="#004409" oninput="syncHex('cardVerdeHex','cardVerdeColor'); updatePreview()"><input type="color" id="cardVerdeColor" value="#004409" oninput="syncPicker('cardVerdeColor','cardVerdeHex'); updatePreview()"></div></div>
      <div class="field"><label>Card conteudo bg</label><div class="color-row"><input type="text" id="cardBgHex" value="#f9f9fa" oninput="syncHex('cardBgHex','cardBgColor'); updatePreview()"><input type="color" id="cardBgColor" value="#f9f9fa" oninput="syncPicker('cardBgColor','cardBgHex'); updatePreview()"></div></div>
      <div class="field"><label>Card conteudo borda</label><div class="color-row"><input type="text" id="cardBorderHex" value="#e1e1e6" oninput="syncHex('cardBorderHex','cardBorderColor'); updatePreview()"><input type="color" id="cardBorderColor" value="#e1e1e6" oninput="syncPicker('cardBorderColor','cardBorderHex'); updatePreview()"></div></div>
    </div>
  </div>

  <div class="divider-line"></div>

  <div>
    <div class="section-label">Rodape</div>
    <div class="optional-block enabled" id="footerBlock">
      <label class="toggle-row">
        <input type="checkbox" id="footerEnabled" checked onchange="toggleOpt('footerEnabled','footerFields','footerBlock'); updatePreview()">
        <span>Incluir rodape</span>
      </label>
      <div id="footerFields" style="display:flex;flex-direction:column;gap:10px;">
        <div class="field"><label>Texto legal</label><textarea id="footerLegal" oninput="autoResize(this); updatePreview()">*Destinado para maiores de 18 anos. Jogue com responsabilidade.*
Portaria SPA/MF Nº 693/25</textarea></div>
        <div class="field"><label>Chamada redes sociais</label><input type="text" id="footerSocialText" value="Fique de olho nas nossas redes sociais e nao perca nada!" oninput="updatePreview()"></div>

        <div class="section-label" style="margin-bottom:2px;">Redes Sociais</div>
        <div class="social-grid">
          <div class="social-row">
            <label class="social-check"><input type="checkbox" id="instaOn" checked onchange="updatePreview()"><span>Instagram</span></label>
            <input type="url" class="social-url" id="instaUrl" value="https://www.instagram.com/jogodeourobet/" oninput="updatePreview()">
          </div>
          <div class="social-row">
            <label class="social-check"><input type="checkbox" id="teleOn" checked onchange="updatePreview()"><span>Telegram</span></label>
            <input type="url" class="social-url" id="teleUrl" value="https://t.me/jogodeourovip" oninput="updatePreview()">
          </div>
          <div class="social-row">
            <label class="social-check"><input type="checkbox" id="ytOn" checked onchange="updatePreview()"><span>YouTube</span></label>
            <input type="url" class="social-url" id="ytUrl" value="https://www.youtube.com/@JogoDeOuro" oninput="updatePreview()">
          </div>
        </div>

        <div class="field"><label>Texto de descadastro</label><input type="text" id="footerUnsub" value="Se quiser parar de receber nossas novidades e promocoes exclusivas," oninput="updatePreview()"></div>
      </div>
    </div>
  </div>

</div><!-- /sidebar -->

<div class="preview-area">
  <div class="preview-topbar">
    <div class="view-toggle">
      <button class="view-btn active" id="btnDesktop" onclick="setView('desktop')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Desktop
      </button>
      <button class="view-btn" id="btnMobile" onclick="setView('mobile')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
        Mobile
      </button>
    </div>
  </div>
  <div class="preview-scroll-area">
    <div class="preview-frame-wrap" id="previewWrap">
      <iframe id="previewFrame" title="Preview do e-mail" scrolling="no"></iframe>
    </div>
  </div>
</div>

</div><!-- /workspace -->

<div id="globalColorPopup">
  <input type="color" id="globalColorPicker" value="#004409" oninput="onGlobalColorInput()">
  <input type="text" class="color-popup-hex" id="globalColorHex" value="#004409" oninput="onGlobalHexInput()">
  <div class="popup-btns">
    <button class="btn-apply-color" onclick="applyGlobalColor()">Aplicar</button>
    <button class="btn-reset-color" onclick="resetColor()">↺ Padrao</button>
  </div>
</div>

<script>
(function(){
  var blockCount = 0;
  var currentEditorId = null;
  var savedSelMap = {};
  var popup = document.getElementById('globalColorPopup');
  var currentBlobUrl = null;

  /* ── UTILS ── */
  window.syncPicker = function(p,h){ document.getElementById(h).value = document.getElementById(p).value; };
  window.syncHex = function(h,p){ var v=document.getElementById(h).value; if(/^#[0-9a-fA-F]{6}$/.test(v)) document.getElementById(p).value=v; };
  function val(id){ return document.getElementById(id).value.trim(); }
  function checked(id){ return document.getElementById(id).checked; }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  /* auto-resize textarea */
  window.autoResize = function(el){ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; };

  window.insertVar = function(inputId, text){
    var inp=document.getElementById(inputId), s=inp.selectionStart;
    inp.value=inp.value.slice(0,s)+text+inp.value.slice(inp.selectionEnd);
    updatePreview();
  };

  window.toggleOpt = function(checkId,fieldsId,blockId){
    var on=checked(checkId);
    var f=document.getElementById(fieldsId); if(f) f.style.display=on?'flex':'none';
    var b=document.getElementById(blockId); if(b) b.classList.toggle('enabled',on);
  };

  window.setView = function(mode){
    document.getElementById('btnDesktop').classList.toggle('active',mode==='desktop');
    document.getElementById('btnMobile').classList.toggle('active',mode==='mobile');
    document.getElementById('previewWrap').classList.toggle('mobile',mode==='mobile');
    // aguarda a transição de largura (300ms) e recalcula a altura do iframe
    setTimeout(function(){ updatePreview(); }, 320);
  };

  /* ── CLEAN PASTED HTML ── */
  /* Remove atributos do ProseMirror e outros editores ricos */
  function cleanPastedHTML(html){
    var div = document.createElement('div');
    div.innerHTML = html;
    div.querySelectorAll('*').forEach(function(el){
      // remover atributos data-* e class vindos de editores
      Array.from(el.attributes).forEach(function(attr){
        if(attr.name.startsWith('data-') || attr.name==='class' || attr.name==='id'){
          el.removeAttribute(attr.name);
        }
      });
    });
    return div.innerHTML;
  }

  /* ── BLOCK MODE ── */
  window.setBlockMode = function(blockId, mode){
    var wrap=document.getElementById(blockId);
    var edVis=wrap.querySelector('.editor');
    var edHtml=wrap.querySelector('.editor-html');
    var toolbar=wrap.querySelector('.rich-toolbar');
    var btnVis=wrap.querySelector('.btn-visual');
    var btnHtml2=wrap.querySelector('.btn-html');
    if(mode==='html'){
      edHtml.value=edVis.innerHTML;
      edVis.style.display='none'; edHtml.style.display='block';
      if(toolbar) toolbar.style.display='none';
      btnVis.classList.remove('active'); btnHtml2.classList.add('active');
      autoResize(edHtml);
    } else {
      edVis.innerHTML=edHtml.value;
      edVis.style.display='block'; edHtml.style.display='none';
      if(toolbar) toolbar.style.display='flex';
      btnHtml2.classList.remove('active'); btnVis.classList.add('active');
    }
    updatePreview();
  };

  /* ── SELECTION ── */
  window.saveSelFor = function(edId){
    var ed=document.getElementById(edId); ed.focus();
    var sel=window.getSelection();
    if(sel&&sel.rangeCount>0) savedSelMap[edId]=sel.getRangeAt(0).cloneRange();
  };
  function restoreSel(edId){
    var r=savedSelMap[edId]; if(!r) return false;
    var ed=document.getElementById(edId); ed.focus();
    var sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(r); return true;
  }

  /* ── COLOR POPUP ── */
  window.openColorPopup = function(triggerEl,edId){
    currentEditorId=edId;
    saveSelFor(edId);
    var rect=triggerEl.getBoundingClientRect();
    popup.style.top=(rect.bottom+4)+'px';
    popup.style.left=Math.min(rect.left,window.innerWidth-210)+'px';
    popup.classList.add('open');
    var dot=triggerEl.querySelector('.color-dot');
    var c=(dot&&dot.style.background)?dot.style.background:'#004409';
    document.getElementById('globalColorPicker').value=c;
    document.getElementById('globalColorHex').value=c;
  };
  window.onGlobalColorInput=function(){ document.getElementById('globalColorHex').value=document.getElementById('globalColorPicker').value; };
  window.onGlobalHexInput=function(){ var h=document.getElementById('globalColorHex').value; if(/^#[0-9a-fA-F]{6}$/.test(h)) document.getElementById('globalColorPicker').value=h; };

  window.applyGlobalColor=function(){
    var color=document.getElementById('globalColorHex').value;
    if(!color||!currentEditorId){popup.classList.remove('open');return;}
    if(restoreSel(currentEditorId)){
      document.execCommand('foreColor',false,color);
      var wrap=document.getElementById(currentEditorId).closest('.block-wrap');
      if(wrap){var dot=wrap.querySelector('.color-trigger .color-dot');if(dot) dot.style.background=color;}
      updatePreview();
    }
    popup.classList.remove('open');
  };

  window.resetColor=function(){
    if(!currentEditorId){popup.classList.remove('open');return;}
    if(restoreSel(currentEditorId)){
      document.execCommand('removeFormat',false,null);
      updatePreview();
    }
    popup.classList.remove('open');
  };

  document.addEventListener('mousedown',function(e){
    if(!popup.classList.contains('open')) return;
    if(!popup.contains(e.target)&&!e.target.closest('.color-trigger')) popup.classList.remove('open');
  });

  /* ── FONT SIZE ── */
  window.applyFontSize=function(selectEl,edId){
    var size=selectEl.value; if(!size) return;
    var r=savedSelMap[edId]; if(!r||r.collapsed){selectEl.value='';return;}
    var ed=document.getElementById(edId); ed.focus();
    var sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
    var span=document.createElement('span'); span.style.fontSize=size;
    try{r.surroundContents(span);}catch(ex){var frag=r.extractContents();span.appendChild(frag);r.insertNode(span);}
    selectEl.value='';
    updatePreview();
  };

  /* ── RICH TEXT ── */
  window.fmtCmd=function(e,edId,cmd){e.preventDefault();document.getElementById(edId).focus();document.execCommand(cmd,false,null);updatePreview();};
  window.insertLinkFor=function(e,edId){e.preventDefault();var url=prompt('URL do link:');if(!url) return;document.getElementById(edId).focus();document.execCommand('createLink',false,url);updatePreview();};

  function buildToolbar(edId){
    return '<button class="tb-btn" onmousedown="fmtCmd(event,\''+edId+'\',\'bold\')"><b>B</b></button>'
      +'<button class="tb-btn" onmousedown="fmtCmd(event,\''+edId+'\',\'italic\')"><i>I</i></button>'
      +'<button class="tb-btn" onmousedown="fmtCmd(event,\''+edId+'\',\'underline\')"><u>U</u></button>'
      +'<div class="tb-sep"></div>'
      +'<select class="tb-size" onmousedown="saveSelFor(\''+edId+'\')" onchange="applyFontSize(this,\''+edId+'\')">'
      +'<option value="">Tam</option>'
      +'<option value="12px">12</option><option value="14px">14</option><option value="16px">16</option>'
      +'<option value="18px">18</option><option value="20px">20</option><option value="24px">24</option>'
      +'<option value="28px">28</option><option value="32px">32</option>'
      +'</select>'
      +'<div class="tb-sep"></div>'
      +'<button class="color-trigger" onmousedown="saveSelFor(\''+edId+'\')" onclick="openColorPopup(this,\''+edId+'\')">'
      +'<span class="color-dot" style="background:#004409;"></span>Cor'
      +'</button>'
      +'<div class="tb-sep"></div>'
      +'<button class="tb-btn" onmousedown="fmtCmd(event,\''+edId+'\',\'insertUnorderedList\')">• Lista</button>'
      +'<button class="tb-btn" onmousedown="fmtCmd(event,\''+edId+'\',\'insertOrderedList\')">1. Lista</button>'
      +'<div class="tb-sep"></div>'
      +'<button class="tb-btn" onmousedown="insertLinkFor(event,\''+edId+'\')">Link</button>';
  }

  /* ── ADD BLOCK ── */
  window.addBlock=function(){
    blockCount++;
    var id='block_'+blockCount,edId='ed_'+blockCount,htmlId='edhtml_'+blockCount;
    var div=document.createElement('div');
    div.className='block-wrap'; div.id=id; div.dataset.align='left';
    div.innerHTML=
      '<div class="block-header">'
        +'<span class="block-label">Bloco '+blockCount+'</span>'
        +'<div class="block-header-right">'
          +'<button class="seg-btn btn-visual active" onclick="setBlockMode(\''+id+'\',\'visual\')">Visual</button>'
          +'<button class="seg-btn btn-html" onclick="setBlockMode(\''+id+'\',\'html\')">HTML</button>'
          +'<div class="tb-sep" style="height:16px;margin:0 3px;"></div>'
          +'<button class="seg-btn active" onclick="setAlign(\''+id+'\',\'left\')">Esq</button>'
          +'<button class="seg-btn" onclick="setAlign(\''+id+'\',\'center\')">Centro</button>'
          +'<button class="seg-btn" onclick="setAlign(\''+id+'\',\'right\')">Dir</button>'
          +'<div class="tb-sep" style="height:16px;margin:0 3px;"></div>'
          +'<button class="block-remove" onclick="removeBlock(\''+id+'\')" title="Remover">&#10005;</button>'
        +'</div>'
      +'</div>'
      +'<div class="rich-toolbar">'+buildToolbar(edId)+'</div>'
      +'<div class="editor" id="'+edId+'" contenteditable="true"></div>'
      +'<textarea class="editor-html" id="'+htmlId+'"></textarea>';

    document.getElementById('blocksContainer').appendChild(div);

    var edVis = document.getElementById(edId);
    var edHtml = document.getElementById(htmlId);

    /* PASTE: limpa HTML de outros editores e atualiza preview */
    edVis.addEventListener('paste', function(e){
      e.preventDefault();
      var html = (e.clipboardData||window.clipboardData).getData('text/html');
      var text = (e.clipboardData||window.clipboardData).getData('text/plain');
      if(html){
        var clean = cleanPastedHTML(html);
        document.execCommand('insertHTML', false, clean);
      } else {
        var lines = text.split(/\r?\n/);
        lines.forEach(function(line, i){
          document.execCommand('insertText', false, line);
          if(i < lines.length - 1) document.execCommand('insertParagraph', false, null);
        });
      }
      setTimeout(function(){ updatePreview(); }, 0);
    });

    edVis.addEventListener('input', function(){ updatePreview(); });

    edHtml.addEventListener('input', function(){
      edVis.innerHTML = edHtml.value;
      autoResize(edHtml);
      updatePreview();
    });

    edVis.focus();
    updatePreview();
  };

  window.setAlign=function(blockId,align){
    var block=document.getElementById(blockId);
    block.dataset.align=align;
    var map={'Esq':'left','Centro':'center','Dir':'right'};
    block.querySelectorAll('.seg-btn').forEach(function(b){var t=b.textContent.trim();if(map[t]!==undefined) b.classList.toggle('active',map[t]===align);});
    updatePreview();
  };

  window.removeBlock=function(blockId){var el=document.getElementById(blockId);if(el) el.parentNode.removeChild(el);updatePreview();};

  /* ── GENERATE HTML ── */
  function generateEmailHTML(){
    var previewText=val('previewText');
    var logoOn=checked('logoEnabled'),logoUrl=val('logoUrl'),logoLink=val('logoLink');
    var banner=val('bannerUrl'),bannerLnk=val('bannerLink');
    var titleOn=checked('titleEnabled'),titleTxt=val('titleText'),titleClr=val('titleColorHex')||'#242424';
    var btnOn=checked('btnEnabled'),btnTxt=val('btnText'),btnLnk=val('btnLink');
    var btnBg=val('btnBgHex')||'#f4d303',btnTxtClr=val('btnTxtHex')||'#242424',btnBorder=val('btnBorderHex')||'#000000';
    var btnTab=checked('btnNewTab');
    var bgExt=val('bgHex')||'#002d14',cardVerde=val('cardVerdeHex')||'#004409';
    var cardBg=val('cardBgHex')||'#f9f9fa',cardBorder=val('cardBorderHex')||'#e1e1e6';
    var footerOn=checked('footerEnabled');
    var fLegal=val('footerLegal').replace(/\n/g,'<br />');
    var fSocText=val('footerSocialText');
    var fUnsub=val('footerUnsub');
    var instaOn=checked('instaOn'),instaUrl=val('instaUrl');
    var teleOn=checked('teleOn'),teleUrl=val('teleUrl');
    var ytOn=checked('ytOn'),ytUrl=val('ytUrl');

    var previewBlock=previewText
      ?'<div style="display:none;overflow:hidden;line-height:1px;opacity:0;max-height:0;max-width:0;" data-skip-in-text="true">'+esc(previewText)+'<div>'+Array(91).join('&zwnj;&nbsp;')+'</div></div>'
      :'';

    var logoCard='';
    if(logoOn&&logoUrl){
      var lImg='<img alt="Logo" src="'+logoUrl+'" style="display:inline-block;outline:none;border:none;text-decoration:none;max-width:100%;" width="250" />';
      var lInner=logoLink?'<a href="'+logoLink+'" target="_blank" style="display:inline-block;">'+lImg+'</a>':lImg;
      logoCard='<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="max-width:600px;margin:0 auto 10px;background-color:'+cardVerde+';color:#f0f0f0;border-radius:15px;overflow:hidden;"><tbody><tr style="width:100%"><td><h1 style="padding:10px 0 0;text-align:center;">'+lInner+'</h1></td></tr></tbody></table>';
    }

    var bannerCard='';
    if(banner){
      var bImg='<img alt="Banner" src="'+banner+'" style="display:block;outline:none;border:none;text-decoration:none;width:100%;height:auto;" width="600" />';
      var bInner=bannerLnk?'<a href="'+bannerLnk+'" target="_blank" style="display:block;">'+bImg+'</a>':bImg;
      bannerCard='<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="max-width:600px;margin:0 auto 10px;background-color:#eeeeee;color:#242424;border-radius:15px;border:1px solid '+cardVerde+';overflow:hidden;"><tbody><tr style="width:100%"><td><table align="center" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="padding:0;text-align:center;"><tbody><tr><td>'+bInner+'</td></tr></tbody></table></td></tr></tbody></table>';
    }

    var titleHtml=(titleOn&&titleTxt)
      ?'<p style="font-size:24px;line-height:150%;font-weight:900;margin-bottom:15px;text-align:center;margin-top:16px;color:'+titleClr+';">'+esc(titleTxt)+'</p>'
      :'';

    var blocksHtml='';
    document.querySelectorAll('.block-wrap').forEach(function(block){
      var edVis=block.querySelector('.editor'),edHtml=block.querySelector('.editor-html');
      var isHtml=edHtml&&edHtml.style.display!=='none';
      var content=isHtml?edHtml.value.trim():(edVis?edVis.innerHTML.trim():'');
      if(!content) return;
      blocksHtml+='<p style="font-size:16px;line-height:165%;font-weight:500;margin-top:16px;margin-bottom:16px;text-align:'+(block.dataset.align||'left')+';">'+content+'</p>';
    });

    var btnHtml=(btnOn&&btnTxt&&btnLnk)
      ?'<div style="margin-top:30px;text-align:center;"><a href="'+btnLnk+'"'+(btnTab?' target="_blank"':'')+' style="line-height:100%;text-decoration:none;display:inline-block;max-width:100%;background-color:'+btnBg+';color:'+btnTxtClr+';font-weight:900;padding:12px 30px;font-size:16px;border-radius:10px;border:3px solid '+btnBorder+';text-transform:uppercase;"><span style="max-width:100%;display:inline-block;line-height:120%;">'+esc(btnTxt)+'</span></a></div>'
      :'';

    var footerCard='';
    if(footerOn){
      var socCells='';
      if(instaOn&&instaUrl) socCells+='<td style="padding:0 15px;"><a href="'+instaUrl+'" target="_blank" rel="noopener noreferrer"><img alt="Instagram" src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" style="display:block;outline:none;border:none;text-decoration:none;border-radius:100%;" width="35" /></a></td>';
      if(teleOn&&teleUrl)   socCells+='<td style="padding:0 15px;"><a href="'+teleUrl+'"  target="_blank" rel="noopener noreferrer"><img alt="Telegram"  src="https://cdn-icons-png.flaticon.com/512/2111/2111644.png" style="display:block;outline:none;border:none;text-decoration:none;border-radius:10%;"  width="30" /></a></td>';
      if(ytOn&&ytUrl)       socCells+='<td style="padding:0 15px;"><a href="'+ytUrl+'"    target="_blank" rel="noopener noreferrer"><img alt="YouTube"   src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" style="display:block;outline:none;border:none;text-decoration:none;border-radius:10%;"  width="35" /></a></td>';

      footerCard='<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="max-width:600px;margin:0 auto 10px;background-color:'+cardVerde+';color:#f0f0f0;border-radius:15px;overflow:hidden;"><tbody><tr style="width:100%"><td>'
        +'<p style="font-size:14px;line-height:24px;color:#dadada;margin-top:20px;margin-bottom:10px;text-align:center;padding-inline:40px;">'+fLegal+'</p>'
        +(socCells?
          '<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="text-align:center;"><tbody><tr><td>'
          +'<p style="font-size:15px;line-height:24px;color:#ffffff;margin-bottom:16px;padding-inline:40px;margin-top:16px;">'+esc(fSocText)+'</p>'
          +'<table style="margin:0 auto" cellpadding="0" cellspacing="0" role="presentation"><tr>'+socCells+'</tr></table>'
          +'</td></tr></tbody></table>'
          :'')
        +'<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="padding:12px 10px;text-align:center;"><tbody><tr><td>'
        +'<p style="font-size:12px;line-height:24px;color:#999;margin-top:16px;margin-bottom:16px;">'+esc(fUnsub)+' <a href="dp:unsubscribe" style="color:#f4d303;text-decoration:underline;">clique aqui</a>.</p>'
        +'</td></tr></tbody></table>'
        +'</td></tr></tbody></table>';
    }

    return '<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">'
      +'<html style="margin:0;padding:0" dir="ltr" lang="pt-BR">'
      +'<head><meta content="text/html; charset=UTF-8" http-equiv="Content-Type" /><meta name="x-apple-disable-message-reformatting" />'
      +'<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&amp;display=swap" rel="stylesheet" /></head>'
      +'<body style="background-color:'+bgExt+'">'
      +previewBlock
      +'<table border="0" width="100%" cellpadding="0" cellspacing="0" role="presentation" align="center"><tbody><tr>'
      +'<td style="margin:0;padding:0;padding-top:50px;padding-bottom:50px;background-color:'+bgExt+';font-family:\'Inter\',Arial,sans-serif;">'
      +logoCard+bannerCard
      +'<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="max-width:600px;margin:0 auto 10px;background-color:'+cardBg+';color:#242424;border-radius:15px;border:1px solid '+cardBorder+';overflow:hidden;">'
      +'<tbody><tr style="width:100%"><td>'
      +'<table align="center" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="padding:40px 25px;">'
      +'<tbody><tr><td>'+titleHtml+blocksHtml+btnHtml+'</td></tr></tbody></table>'
      +'</td></tr></tbody></table>'
      +footerCard
      +'</td></tr></tbody></table>'
      +'</body></html>';
  }

  /* ── PREVIEW via Blob URL (resolve scroll em arquivo local) ── */
  window.updatePreview = function(){
    var html = generateEmailHTML();
    var frame = document.getElementById('previewFrame');

    // revogar blob anterior
    if(currentBlobUrl){ URL.revokeObjectURL(currentBlobUrl); currentBlobUrl=null; }

    var blob = new Blob([html], {type:'text/html;charset=utf-8'});
    currentBlobUrl = URL.createObjectURL(blob);

    frame.onload = function(){
      try{
        var doc = frame.contentDocument || frame.contentWindow.document;
        var h = Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight);
        frame.style.height = h + 'px';
      }catch(e){}
    };
    frame.src = currentBlobUrl;
  };

  /* ── COPY ── */
  window.copyHTML=function(){
    navigator.clipboard.writeText(generateEmailHTML()).then(function(){
      var btn=document.getElementById('btnCopy');
      btn.classList.add('copied'); btn.textContent='Copiado!';
      setTimeout(function(){
        btn.classList.remove('copied');
        btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copiar HTML';
      },2500);
    });
  };

  /* ── INIT ── */
  window.addEventListener('DOMContentLoaded',function(){
    // auto-resize textarea do rodapé
    document.querySelectorAll('textarea').forEach(function(t){ autoResize(t); });
    addBlock();
    updatePreview();
  });
}());
</script>
</body>
</html>
